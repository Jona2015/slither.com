<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SLITHER</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.7.2/socket.io.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #050a0f; overflow: hidden; font-family: 'Share Tech Mono', monospace; color: #00ff88; }
  #gameCanvas { display: block; cursor: none; }

  #score-panel {
    position: fixed; top: 20px; left: 20px;
    background: rgba(0,255,136,0.05); border: 1px solid rgba(0,255,136,0.3);
    border-radius: 4px; padding: 12px 20px; backdrop-filter: blur(10px);
  }
  #score-label { font-family: 'Orbitron', sans-serif; font-size: 10px; letter-spacing: 3px; color: rgba(0,255,136,0.5); text-transform: uppercase; }
  #score-value { font-family: 'Orbitron', sans-serif; font-size: 28px; font-weight: 900; color: #00ff88; line-height: 1; margin-top: 4px; }

  #player-count {
    position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
    font-family: 'Orbitron', sans-serif; font-size: 11px; letter-spacing: 2px;
    color: rgba(255,255,255,0.3); text-transform: uppercase;
  }
  #player-count span { color: #00ff88; }

  #leaderboard {
    position: fixed; top: 20px; right: 20px; width: 200px;
    background: rgba(0,0,0,0.7); border: 1px solid rgba(255,255,255,0.1);
    border-radius: 8px; padding: 12px; backdrop-filter: blur(10px);
  }
  #leaderboard h3 { font-family: 'Orbitron', sans-serif; font-size: 11px; letter-spacing: 2px; color: rgba(255,255,255,0.4); text-transform: uppercase; margin-bottom: 10px; text-align: center; }
  .lb-entry { display: flex; align-items: center; padding: 4px 0; font-size: 12px; border-bottom: 1px solid rgba(255,255,255,0.05); }
  .lb-rank { width: 20px; color: rgba(255,255,255,0.3); font-size: 10px; }
  .lb-name { flex: 1; color: rgba(255,255,255,0.7); }
  .lb-score { color: #00ff88; font-size: 11px; }
  .lb-entry.me .lb-name { color: #00ff88; font-weight: bold; }
  .lb-entry.me .lb-score { color: #ffdd00; }

  #overlay {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    background: rgba(5,10,15,0.95); z-index: 100; backdrop-filter: blur(4px); pointer-events: all;
  }
  #overlay h1 {
    font-family: 'Orbitron', sans-serif; font-size: clamp(36px, 6vw, 72px); font-weight: 900;
    letter-spacing: 8px; background: linear-gradient(135deg, #00ff88, #00c8ff);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
    filter: drop-shadow(0 0 30px rgba(0,255,136,0.5)); margin-bottom: 8px;
  }
  .subtitle { font-size: 13px; letter-spacing: 4px; color: rgba(255,255,255,0.3); margin-bottom: 40px; text-transform: uppercase; }

  .field-group { margin-bottom: 20px; }
  .field-group label { display: block; font-size: 11px; letter-spacing: 3px; color: rgba(0,255,136,0.5); margin-bottom: 8px; text-transform: uppercase; }
  .field-group input {
    background: rgba(0,255,136,0.05); border: 1px solid rgba(0,255,136,0.4); color: #00ff88;
    font-family: 'Orbitron', sans-serif; font-size: 16px; padding: 10px 20px; border-radius: 4px;
    outline: none; text-align: center; width: 280px; transition: border-color 0.3s;
  }
  .field-group input:focus { border-color: #00ff88; box-shadow: 0 0 20px rgba(0,255,136,0.2); }

  #server-url { font-size: 13px; }

  .color-picker-row { display: flex; gap: 12px; margin-bottom: 20px; align-items: center; }
  .color-picker-row span { font-size: 11px; letter-spacing: 2px; color: rgba(255,255,255,0.3); text-transform: uppercase; }
  .color-dot { width: 28px; height: 28px; border-radius: 50%; cursor: pointer; border: 2px solid transparent; transition: transform 0.2s, border-color 0.2s; }
  .color-dot:hover { transform: scale(1.2); }
  .color-dot.selected { border-color: white; transform: scale(1.2); }

  .control-picker-row { display: flex; gap: 12px; margin-bottom: 30px; align-items: center; }
  .control-picker-row span { font-size: 11px; letter-spacing: 2px; color: rgba(255,255,255,0.3); text-transform: uppercase; }
  .ctrl-btn {
    padding: 8px 20px; border: 1px solid rgba(0,255,136,0.3); border-radius: 4px;
    color: rgba(255,255,255,0.4); font-family: 'Orbitron', sans-serif; font-size: 12px;
    cursor: pointer; transition: all 0.2s; background: rgba(0,255,136,0.03);
  }
  .ctrl-btn:hover { border-color: rgba(0,255,136,0.6); color: rgba(255,255,255,0.8); }
  .ctrl-btn.selected { border-color: #00ff88; color: #00ff88; background: rgba(0,255,136,0.1); }

  #start-btn {
    font-family: 'Orbitron', sans-serif; font-size: 16px; font-weight: 700; letter-spacing: 4px;
    color: #050a0f; background: linear-gradient(135deg, #00ff88, #00c8ff); border: none;
    padding: 16px 48px; border-radius: 4px; cursor: pointer; text-transform: uppercase;
    transition: transform 0.2s, box-shadow 0.2s; pointer-events: all;
  }
  #start-btn:hover { transform: scale(1.05); box-shadow: 0 0 40px rgba(0,255,136,0.4); }
  #start-btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

  #connect-status {
    margin-top: 14px; font-size: 12px; letter-spacing: 2px;
    color: rgba(255,255,255,0.3); min-height: 18px; text-transform: uppercase;
  }
  #connect-status.ok { color: #00ff88; }
  #connect-status.err { color: #ff4466; }

  #death-overlay {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    display: none; flex-direction: column; align-items: center; justify-content: center;
    background: rgba(5,10,15,0.88); z-index: 100; backdrop-filter: blur(4px); pointer-events: all;
  }
  #death-overlay.show { display: flex; }
  #death-overlay h2 { font-family: 'Orbitron', sans-serif; font-size: clamp(28px, 5vw, 52px); font-weight: 900; letter-spacing: 6px; color: #ff4466; text-shadow: 0 0 40px rgba(255,68,102,0.6); margin-bottom: 10px; animation: flashIn 0.4s ease-out; }
  #death-score { font-family: 'Orbitron', sans-serif; font-size: 18px; color: rgba(255,255,255,0.5); margin-bottom: 30px; }
  #death-score span { color: #00ff88; font-weight: 700; font-size: 24px; }
  #restart-btn {
    font-family: 'Orbitron', sans-serif; font-size: 14px; font-weight: 700; letter-spacing: 4px;
    color: #050a0f; background: linear-gradient(135deg, #ff4466, #ff8844); border: none;
    padding: 14px 42px; border-radius: 4px; cursor: pointer; text-transform: uppercase;
    transition: transform 0.2s;
  }
  #restart-btn:hover { transform: scale(1.05); }

  #controls-hint { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); font-size: 11px; letter-spacing: 2px; color: rgba(255,255,255,0.2); text-align: center; text-transform: uppercase; }
  .boost-indicator { position: fixed; bottom: 20px; right: 20px; font-family: 'Orbitron', sans-serif; font-size: 11px; letter-spacing: 2px; color: rgba(255,200,0,0.6); text-transform: uppercase; }

  #ping-display { position: fixed; bottom: 40px; left: 20px; font-size: 10px; letter-spacing: 1px; color: rgba(255,255,255,0.2); }

  @keyframes flashIn { from { transform: scale(0.5); opacity: 0; } to { transform: scale(1); opacity: 1; } }
</style>
</head>
<body>
<canvas id="gameCanvas"></canvas>

<div id="score-panel">
  <div id="score-label">Länge</div>
  <div id="score-value">0</div>
</div>
<div id="player-count">Spieler online: <span id="online-count">0</span></div>
<div id="leaderboard"><h3>Bestenliste</h3><div id="lb-list"></div></div>
<div id="controls-hint" >Maus = Steuern &nbsp;|&nbsp; Linksklick / Leertaste = Boost</div>
<div class="boost-indicator" id="boost-ind">BOOST BEREIT</div>
<div id="ping-display">PING: <span id="ping-val">--</span>ms</div>

<div id="overlay">
  <h1>SLITHER</h1>
  <div class="subtitle">Multiplayer</div>

  <div class="field-group">
    <label>Server URL (Railway)</label>
    <input type="text" id="server-url" placeholder="https://dein-server.railway.app" value="">
  </div>

  <div class="field-group">
    <label>Dein Name</label>
    <input type="text" id="player-name" placeholder="Spieler" maxlength="14" value="Spieler">
  </div>

  <div class="color-picker-row">
    <span>Farbe</span>
    <div class="color-dot selected" style="background:#00ff88" data-color="#00ff88,#006633"></div>
    <div class="color-dot" style="background:#00c8ff" data-color="#00c8ff,#004466"></div>
    <div class="color-dot" style="background:#ff4466" data-color="#ff4466,#660022"></div>
    <div class="color-dot" style="background:#ffdd00" data-color="#ffdd00,#665500"></div>
    <div class="color-dot" style="background:#ff8844" data-color="#ff8844,#662211"></div>
    <div class="color-dot" style="background:#cc44ff" data-color="#cc44ff,#440066"></div>
  </div>

  <div class="control-picker-row">
    <span>Steuerung</span>
    <div class="ctrl-btn selected" id="ctrl-mouse" onclick="selectControl('mouse')">🖱 Maus</div>
    <div class="ctrl-btn" id="ctrl-wasd" onclick="selectControl('wasd')">⌨ WASD</div>
  </div>

  <button id="start-btn">VERBINDEN & SPIELEN</button>
  <div id="connect-status"></div>
</div>

<div id="death-overlay">
  <h2>GAME OVER</h2>
  <div id="death-score">Länge: <span id="ds">0</span></div>
  <button id="restart-btn">NOCHMAL</button>
</div>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;
window.addEventListener('resize', () => { canvas.width = window.innerWidth; canvas.height = window.innerHeight; });

// ---- CONFIG ----
const SEGMENT_RADIUS = 10;
const BOOST_DRAIN = 0.15;
const BOOST_REGEN = 0.12;

// ---- STATE ----
let socket = null;
let myId = null;
let myLength = 20;
let gameState = { players: [], bots: [] };
let foods = [];
let camera = { x: 0, y: 0 };
let zoom = 1.0;
let mouseX = canvas.width/2, mouseY = canvas.height/2;
let boosting = false;
let boostEnergy = 100;
let gameRunning = false;
let controlMode = 'mouse';
let playerColor = '#00ff88', playerColorDark = '#006633';
let playerName = 'Spieler';
let animId, frameCount = 0;
let pingStart = 0, ping = 0;
let WORLD_W = 4000, WORLD_H = 4000;
const wasd = { w: false, a: false, s: false, d: false };
let myAngle = 0;
let particles = [];

// ---- COLOR PICKER ----
document.querySelectorAll('.color-dot').forEach(dot => {
  dot.addEventListener('click', () => {
    document.querySelectorAll('.color-dot').forEach(d => d.classList.remove('selected'));
    dot.classList.add('selected');
    const [c1, c2] = dot.dataset.color.split(',');
    playerColor = c1; playerColorDark = c2;
  });
});

function selectControl(mode) {
  controlMode = mode;
  document.getElementById('ctrl-mouse').classList.toggle('selected', mode === 'mouse');
  document.getElementById('ctrl-wasd').classList.toggle('selected', mode === 'wasd');
  document.getElementById('controls-hint').textContent =
    mode === 'wasd' ? 'W/A/S/D = Steuern  |  Leertaste = Boost' : 'Maus = Steuern  |  Linksklick / Leertaste = Boost';
}

// ---- CONTROLS ----
canvas.addEventListener('mousemove', e => { mouseX = e.clientX; mouseY = e.clientY; });
canvas.addEventListener('mousedown', e => { if (e.button === 0) boosting = true; });
canvas.addEventListener('mouseup', e => { if (e.button === 0) boosting = false; });
window.addEventListener('keydown', e => {
  if (e.code === 'Space') { boosting = true; e.preventDefault(); }
  if (e.code === 'KeyW') wasd.w = true;
  if (e.code === 'KeyA') wasd.a = true;
  if (e.code === 'KeyS') wasd.s = true;
  if (e.code === 'KeyD') wasd.d = true;
});
window.addEventListener('keyup', e => {
  if (e.code === 'Space') boosting = false;
  if (e.code === 'KeyW') wasd.w = false;
  if (e.code === 'KeyA') wasd.a = false;
  if (e.code === 'KeyS') wasd.s = false;
  if (e.code === 'KeyD') wasd.d = false;
});

// ---- CONNECT ----
document.getElementById('start-btn').addEventListener('click', () => {
  const serverUrl = document.getElementById('server-url').value.trim();
  if (!serverUrl) {
    setStatus('Bitte Server URL eingeben!', 'err'); return;
  }
  playerName = document.getElementById('player-name').value.trim() || 'Spieler';
  setStatus('Verbinde...', '');
  document.getElementById('start-btn').disabled = true;
  connectToServer(serverUrl);
});

document.getElementById('restart-btn').addEventListener('click', () => {
  document.getElementById('death-overlay').classList.remove('show');
  if (socket && socket.connected) {
    socket.emit('respawn', { name: playerName, color: playerColor, colorDark: playerColorDark });
    myLength = 20;
    boostEnergy = 100;
    gameRunning = true;
  }
});

function setStatus(msg, type) {
  const el = document.getElementById('connect-status');
  el.textContent = msg;
  el.className = type;
}

function connectToServer(url) {
  if (socket) socket.disconnect();

  socket = io(url, { transports: ['websocket', 'polling'] });

  socket.on('connect', () => {
    setStatus('Verbunden! Betrete Spiel...', 'ok');
    socket.emit('join', { name: playerName, color: playerColor, colorDark: playerColorDark });
    // Ping
    setInterval(() => { pingStart = Date.now(); socket.emit('ping_'); }, 2000);
  });

  socket.on('pong_', () => {
    ping = Date.now() - pingStart;
    document.getElementById('ping-val').textContent = ping;
  });

  socket.on('init', (data) => {
    myId = data.myId;
    WORLD_W = data.worldW;
    WORLD_H = data.worldH;
    foods = data.foods;
    gameRunning = true;
    document.getElementById('overlay').style.display = 'none';
    if (animId) cancelAnimationFrame(animId);
    animId = requestAnimationFrame(loop);
  });

  socket.on('gameState', (state) => {
    gameState = state;
    const me = getMe();
    if (me) {
      myLength = me.length;
      myAngle = me.angle;
      boostEnergy = me.boostEnergy;
      // Camera follow
      if (me.segments && me.segments.length > 0) {
        const head = me.segments[0];
        const tx = head.x - canvas.width / (2 * zoom);
        const ty = head.y - canvas.height / (2 * zoom);
        camera.x += (tx - camera.x) * 0.3;
        camera.y += (ty - camera.y) * 0.3;
      }
      if (!me.alive && gameRunning) {
        gameRunning = false;
        document.getElementById('ds').textContent = myLength;
        document.getElementById('death-overlay').classList.add('show');
      }
    }
    // Update online count
    document.getElementById('online-count').textContent = state.players.length;
  });

  socket.on('foodState', (f) => { foods = f; });

  socket.on('foodEaten', ({ snakeId, foodIds, length }) => {
    const ids = new Set(foodIds);
    foods = foods.filter(f => !ids.has(f.id));
    if (snakeId === myId) myLength = length;
  });

  socket.on('snakeDied', ({ id, newFoods }) => {
    if (newFoods) foods.push(...newFoods);
    if (id === myId && gameRunning) {
      gameRunning = false;
      document.getElementById('ds').textContent = myLength;
      document.getElementById('death-overlay').classList.add('show');
    }
  });

  socket.on('disconnect', () => {
    setStatus('Verbindung getrennt', 'err');
    gameRunning = false;
  });

  socket.on('connect_error', (err) => {
    setStatus('Verbindung fehlgeschlagen: ' + err.message, 'err');
    document.getElementById('start-btn').disabled = false;
  });
}

// ---- INPUT SENDER ----
function getTargetAngle() {
  if (controlMode === 'wasd') {
    const dx = (wasd.d ? 1 : 0) - (wasd.a ? 1 : 0);
    const dy = (wasd.s ? 1 : 0) - (wasd.w ? 1 : 0);
    if (dx !== 0 || dy !== 0) return Math.atan2(dy, dx);
    return myAngle;
  }
  return Math.atan2(mouseY - canvas.height / 2, mouseX - canvas.width / 2);
}

setInterval(() => {
  if (socket && socket.connected && gameRunning) {
    socket.emit('input', { targetAngle: getTargetAngle(), boosting: boosting && boostEnergy > 0 });
  }
}, 33);

// ---- HELPERS ----
function getMe() {
  return gameState.players.find(p => p.id === myId) || null;
}

function spawnParticles(x, y, color) {
  for (let i = 0; i < 12; i++) {
    const a = Math.random() * Math.PI * 2;
    const s = 1 + Math.random() * 3;
    particles.push({ x, y, vx: Math.cos(a)*s, vy: Math.sin(a)*s, r: 2 + Math.random()*3, color, life: 1, decay: 0.03 });
  }
}

// ---- DRAW ----
function drawGrid() {
  ctx.strokeStyle = 'rgba(0,255,136,0.04)';
  ctx.lineWidth = 1;
  const gs = 80;
  ctx.beginPath();
  for (let x = -camera.x % gs; x < canvas.width; x += gs) { ctx.moveTo(x, 0); ctx.lineTo(x, canvas.height); }
  for (let y = -camera.y % gs; y < canvas.height; y += gs) { ctx.moveTo(0, y); ctx.lineTo(canvas.width, y); }
  ctx.stroke();
}

function drawFood(f) {
  const sx = f.x - camera.x, sy = f.y - camera.y;
  if (sx < -20 || sx > canvas.width+20 || sy < -20 || sy > canvas.height+20) return;
  ctx.beginPath();
  ctx.arc(sx, sy, f.r, 0, Math.PI * 2);
  ctx.fillStyle = f.color;
  ctx.fill();
}

function drawSnake(snake, isMe) {
  if (!snake.alive || !snake.segments || snake.segments.length === 0) return;
  const segs = snake.segments;
  const len = segs.length;
  const angle = snake.angle;

  for (let i = len - 1; i >= 0; i--) {
    const seg = segs[i];
    const sx = seg.x - camera.x, sy = seg.y - camera.y;
    if (sx < -30 || sx > canvas.width+30 || sy < -30 || sy > canvas.height+30) continue;
    const t = i / len;
    const r = SEGMENT_RADIUS * (1 - t * 0.35);
    ctx.beginPath();
    ctx.arc(sx, sy, r, 0, Math.PI * 2);
    ctx.fillStyle = i % 3 === 0 ? snake.colorDark : snake.color;
    ctx.fill();
  }

  // Head highlight for me
  if (isMe) {
    const hx = segs[0].x - camera.x, hy = segs[0].y - camera.y;
    ctx.beginPath();
    ctx.arc(hx, hy, SEGMENT_RADIUS + 4, 0, Math.PI * 2);
    ctx.strokeStyle = 'rgba(255,255,255,0.3)';
    ctx.lineWidth = 1.5;
    ctx.stroke();
  }

  // Eyes
  const head = segs[0];
  const hx = head.x - camera.x, hy = head.y - camera.y;
  const eo = SEGMENT_RADIUS * 0.5, er = SEGMENT_RADIUS * 0.28;
  const pa = angle + Math.PI/2;
  const ex1 = hx + Math.cos(pa)*eo + Math.cos(angle)*eo;
  const ey1 = hy + Math.sin(pa)*eo + Math.sin(angle)*eo;
  const ex2 = hx - Math.cos(pa)*eo + Math.cos(angle)*eo;
  const ey2 = hy - Math.sin(pa)*eo + Math.sin(angle)*eo;
  ctx.fillStyle = 'white';
  ctx.beginPath(); ctx.arc(ex1, ey1, er, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(ex2, ey2, er, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = '#111';
  ctx.beginPath(); ctx.arc(ex1+Math.cos(angle)*er*0.4, ey1+Math.sin(angle)*er*0.4, er*0.55, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(ex2+Math.cos(angle)*er*0.4, ey2+Math.sin(angle)*er*0.4, er*0.55, 0, Math.PI*2); ctx.fill();

  // Name tag
  ctx.font = '11px Share Tech Mono';
  ctx.textAlign = 'center';
  ctx.fillStyle = isMe ? 'rgba(0,255,136,0.9)' : 'rgba(255,255,255,0.6)';
  ctx.fillText(snake.name, hx, hy - SEGMENT_RADIUS * 2 - 4);
}

function drawParticles() {
  for (const p of particles) {
    const sx = p.x - camera.x, sy = p.y - camera.y;
    ctx.beginPath(); ctx.arc(sx, sy, p.r * p.life, 0, Math.PI*2);
    ctx.fillStyle = p.color; ctx.globalAlpha = p.life; ctx.fill(); ctx.globalAlpha = 1;
  }
}

function drawMinimap() {
  const mw = 140, mh = 140, mx = canvas.width - 160, my = canvas.height - 160;
  ctx.fillStyle = 'rgba(0,0,0,0.5)'; ctx.fillRect(mx, my, mw, mh);
  ctx.strokeStyle = 'rgba(0,255,136,0.3)'; ctx.lineWidth = 1; ctx.strokeRect(mx, my, mw, mh);
  ctx.fillStyle = 'rgba(255,255,255,0.12)';
  for (const f of foods) ctx.fillRect(mx + (f.x/WORLD_W)*mw - 0.5, my + (f.y/WORLD_H)*mh - 0.5, 1, 1);
  for (const b of gameState.bots) {
    if (!b.alive || !b.segments?.length) continue;
    ctx.beginPath(); ctx.arc(mx+(b.segments[0].x/WORLD_W)*mw, my+(b.segments[0].y/WORLD_H)*mh, 2, 0, Math.PI*2);
    ctx.fillStyle = b.color; ctx.fill();
  }
  for (const p of gameState.players) {
    if (!p.alive || !p.segments?.length) continue;
    const isMe = p.id === myId;
    ctx.beginPath(); ctx.arc(mx+(p.segments[0].x/WORLD_W)*mw, my+(p.segments[0].y/WORLD_H)*mh, isMe?3:2, 0, Math.PI*2);
    ctx.fillStyle = isMe ? '#ffffff' : p.color; ctx.fill();
  }
  ctx.fillStyle = 'rgba(255,255,255,0.15)'; ctx.font = '9px Share Tech Mono'; ctx.textAlign = 'left';
  ctx.fillText('KARTE', mx+4, my+11);
}

function drawBoostBar() {
  const bw = 200, bh = 6, bx = (canvas.width-bw)/2, by = canvas.height-30;
  ctx.fillStyle = 'rgba(0,0,0,0.4)'; ctx.fillRect(bx-1, by-1, bw+2, bh+2);
  const grd = ctx.createLinearGradient(bx, 0, bx+bw, 0);
  grd.addColorStop(0, '#ffdd00'); grd.addColorStop(1, '#ff8844');
  ctx.fillStyle = grd; ctx.fillRect(bx, by, bw*(boostEnergy/100), bh);
  ctx.fillStyle = 'rgba(255,255,255,0.2)'; ctx.font = '9px Share Tech Mono'; ctx.textAlign = 'center';
  ctx.fillText('BOOST', canvas.width/2, by-4);
}

function updateLeaderboard() {
  const entries = [];
  for (const p of gameState.players) entries.push({ name: p.name, score: p.length, me: p.id === myId });
  for (const b of gameState.bots) if (b.alive) entries.push({ name: b.name, score: b.length, me: false });
  entries.sort((a, b) => b.score - a.score);
  document.getElementById('lb-list').innerHTML = entries.slice(0, 7).map((e, i) =>
    `<div class="lb-entry${e.me?' me':''}">
      <span class="lb-rank">${i+1}</span>
      <span class="lb-name">${e.me?'▶ ':''} ${e.name}</span>
      <span class="lb-score">${e.score}</span>
    </div>`).join('');
}

// ---- MAIN LOOP ----
function loop() {
  animId = requestAnimationFrame(loop);
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  ctx.fillStyle = '#050a0f'; ctx.fillRect(0, 0, canvas.width, canvas.height);
  drawGrid();

  if (!gameRunning) return;

  // Zoom
  const targetZoom = Math.max(0.18, 1.0 - (myLength / 180));
  zoom += (targetZoom - zoom) * 0.04;

  ctx.save();
  ctx.translate(canvas.width/2, canvas.height/2);
  ctx.scale(zoom, zoom);
  ctx.translate(-canvas.width/2, -canvas.height/2);

  // Border
  ctx.strokeStyle = '#00ff88'; ctx.lineWidth = 3;
  ctx.strokeRect(-camera.x, -camera.y, WORLD_W, WORLD_H);

  for (const f of foods) drawFood(f);
  for (const b of gameState.bots) drawSnake(b, false);
  for (const p of gameState.players) drawSnake(p, p.id === myId);
  ctx.restore();

  // Particles
  for (let i = particles.length-1; i >= 0; i--) {
    const p = particles[i]; p.x += p.vx; p.y += p.vy; p.vx *= 0.96; p.vy *= 0.96; p.life -= p.decay;
    if (p.life <= 0) particles.splice(i, 1);
  }
  drawParticles();
  drawMinimap();
  drawBoostBar();

  if (frameCount % 10 === 0) {
    document.getElementById('score-value').textContent = myLength;
    document.getElementById('boost-ind').style.opacity = boostEnergy > 20 ? '0.8' : '0.2';
    document.getElementById('boost-ind').textContent = boostEnergy > 20 ? 'BOOST BEREIT' : 'BOOST LÄDT...';
  }
  if (frameCount % 120 === 0) updateLeaderboard();
  frameCount++;
}

// idle draw
animId = requestAnimationFrame(loop);
</script>
